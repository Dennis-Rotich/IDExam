<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal | Web Proctoring Test</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        /* Fullscreen Warning Overlay */
        #warning-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.95);
            color: white;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .warning-content {
            background: #d9534f;
            padding: 40px;
            border-radius: 8px;
            max-width: 500px;
        }
        .warning-content button {
            background-color: white;
            color: #d9534f;
        }
    </style>
</head>
<body>

   <div class="container" id="exam-container">
    <h1>Annual Competency Assessment</h1>
    <p>This exam is strictly proctored. Once you begin, you must remain in fullscreen mode. Do not switch tabs, minimize the window, or refresh the page.</p>
    
    <input 
        type="text" 
        id="student-id-input" 
        placeholder="Enter your Student ID" 
        style="padding: 0.8rem; font-size: 1rem; width: 80%; margin-top: 1rem; border-radius: 6px; border: 1px solid #ccc;"
    >
    <br>

    <button onclick="startExamFullscreen()">Start Proctored Exam</button>
    </div>

    <div id="warning-screen">
        <div class="warning-content">
            <h2>⚠️ Security Warning</h2>
            <p id="warning-reason">You have navigated away from the exam window.</p>
            <p id="warning-count">Violation x of y</p>
            <button onclick="resumeExam()">Acknowledge and Resume</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
